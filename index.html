<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gangster Wars - Google Play Domain Verification and Privacy Policy">
    <title>GangsterWars</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .image-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .image-card img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .info-section {
            margin-top: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 15px;
            border-left: 5px solid #667eea;
        }
        
        .info-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        
        .info-section p {
            color: #555;
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 GangsterWars</h1>
        
        <div class="gallery">
            <div class="image-card">
                <img src="splash.png" alt="GangsterWars Splash Screen">
            </div>
            <div class="image-card">
                <img src="splash1.png" alt="GangsterWars Game Screen 1">
            </div>
            <div class="image-card">
                <img src="splash2.png" alt="GangsterWars Game Screen 2">
            </div>
        </div>
        
        <div class="info-section">
            <h2>📱 关于游戏</h2>
            <p>GangsterWars 是一款激动人心的策略游戏，带您进入充满挑战的黑帮世界。</p>
            <p>本页面用于 Google Play 网域验证和隐私协议展示。</p>
        </div>
        
        <div class="info-section">
            <h2>🔒 隐私政策</h2>
            <p>我们重视您的隐私。本应用收集的所有数据仅用于改善游戏体验，不会与第三方共享。</p>
            <p>如有任何隐私相关问题，请通过官方渠道联系我们。</p>
        </div>
        
        <footer>
            <p>&copy; 2026 GangsterWars. All rights reserved.</p>
            <p>Google Play Domain Verification Page</p>
        </footer>
    </div>
</body>
</html>
